# FFAI Main Configuration
# =======================
# Retry and observability settings.

retry:
  max_attempts: 3
  min_wait_seconds: 1
  max_wait_seconds: 60
  exponential_base: 2
  exponential_jitter: true
  retry_on_status_codes:
    - 429
    - 503
    - 502
    - 504
  log_level: "INFO"

observability:
  enabled: false
  otel:
    service_name: "plico"
    endpoint: "http://localhost:4317"
    export_traces: true
    insecure: true
  token_tracking: true
  cost_tracking: true

rag:
  enabled: false
  store_backend: chroma
  embedding_model: "mistral/mistral-embed"
  chunker: recursive
  chunk_size: 1000
  chunk_overlap: 200

memory:
  enabled: false                                  # opt-in; matches rag.enabled convention
  embedding_model: null                           # null -> resolution ladder (local backend if installed, else API key, else disabled)
  store_backend: memory                           # reserved; Tier 1 uses built-in in-memory store
  store_config: {}
  persist_dir: "./ffai_data/memory"
  collection_name: "ffai_turns"
  persist: false                                  # ephemeral by default; set true to survive restarts
