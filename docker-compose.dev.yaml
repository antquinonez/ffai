# Vector store backends for local development and testing.
# NOT for production use.
#
# Usage:
#   docker compose -f docker-compose.dev.yaml up -d           # start all
#   docker compose -f docker-compose.dev.yaml up -d postgres   # pgvector only
#   docker compose -f docker-compose.dev.yaml down             # stop (data persists)
#   docker compose -f docker-compose.dev.yaml down -v          # stop and wipe data

version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ffai
      POSTGRES_PASSWORD: ${PGPASSWORD:-dev}
      POSTGRES_DB: ffai_test
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ffai"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  pgdata:
  qdrant_data:
